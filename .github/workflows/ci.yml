name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run the full Playwright E2E suite"
        required: false
        type: boolean
        default: false

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      CRON_SECRET: test-secret-ci-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start Supabase
        run: npx supabase start

      - name: Setup environment variables
        shell: bash
        run: |
          set -euo pipefail

          rm -f supabase.env .env.local

          for attempt in {1..12}; do
            npx supabase status -o env > supabase.env || true

            NEXT_PUBLIC_SUPABASE_URL="$(grep -E '^API_URL=' supabase.env | cut -d '=' -f2- | tr -d '\"' || true)"
            NEXT_PUBLIC_SUPABASE_ANON_KEY="$(grep -E '^ANON_KEY=' supabase.env | cut -d '=' -f2- | tr -d '\"' || true)"
            SUPABASE_SERVICE_ROLE_KEY="$(grep -E '^SERVICE_ROLE_KEY=' supabase.env | cut -d '=' -f2- | tr -d '\"' || true)"

            if [[ -n "${NEXT_PUBLIC_SUPABASE_URL}" && -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" && -n "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
              break
            fi

            if [[ "${attempt}" -eq 12 ]]; then
              echo "Supabase environment variables were not ready after 12 attempts." >&2
              cat supabase.env >&2 || true
              exit 1
            fi

            echo "Supabase env not ready yet; retrying (${attempt}/12)..."
            sleep 5
          done

          echo "::add-mask::${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
          echo "::add-mask::${SUPABASE_SERVICE_ROLE_KEY}"

          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
            echo "CRON_SECRET=test-secret-ci-runner"
          } > .env.local

          if grep -Eq '^(NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_ANON_KEY|SUPABASE_SERVICE_ROLE_KEY)=$' .env.local; then
            echo ".env.local contains empty required Supabase values." >&2
            exit 1
          fi

          cat .env.local >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
